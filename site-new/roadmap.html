<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering From Scratch — Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
<link rel="stylesheet" href="css/cmdpalette.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>Synapse Academy</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html">Course</a>
      <a href="roadmap.html" aria-current="page">Roadmap</a>
      <a href="catalog.html">Catalog</a>
      <a href="library.html">Library</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
    <button class="search-btn" type="button" data-cmd-palette aria-label="Search (Cmd-K)" title="Search (Cmd-K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span><kbd>⌘K</kbd>
    </button>
    <span id="sa-auth-btn"></span>
  </header>

  <main class="wrap page" data-screen-label="Roadmap">
    <div class="mast">
      <h1 class="mast__t">Roadmap</h1>
      <p class="mast__sub">Click any chapter to see what it teaches and how it connects to the rest of the curriculum.</p>
    </div>

    <div class="tree-bar">
      <div class="legend">
        <span class="legend__i legend__i--done">Complete</span>
        <span class="legend__i legend__i--active">In Progress</span>
        <span class="legend__i legend__i--locked">Not started</span>
      </div>
      <div class="tree-bar__right">
        <button class="btn" id="clear" hidden>✕ Clear selection</button>
      </div>
    </div>

    <div id="tree"></div>

    <!-- chapter info card — populated by roadmap.js on node click -->
    <div class="drawer-info" id="chapterCard" hidden>
      <button class="drawer-info__close" id="cardClose" aria-label="Close">✕</button>
      <div id="cardBody"></div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/roadmap.js"></script>
  <script src="js/cmdpalette.js"></script>
</body>
</html>
