<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering From Scratch — Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
<link rel="stylesheet" href="css/cmdpalette.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>Synapse Academy</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html" aria-current="page">Course</a>

      <a href="catalog.html">Catalog</a>
      <a href="library.html">Library</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
    <button class="search-btn" type="button" data-cmd-palette aria-label="Search (Cmd-K)" title="Search (Cmd-K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span><kbd>⌘K</kbd>
    </button>
    <span id="sa-auth-btn"></span>
  </header>

  <main class="wrap page" data-screen-label="Course">

    <div class="mast">
      <h1 class="mast__t">Course</h1>
      <p class="mast__sub">20 chapters. Everything you've done and everything left.</p>
    </div>

    <section class="card" style="margin-top:var(--s5)">
      <div class="card__id" id="id"></div>
      <div class="card__career">
        <div class="eyebrow" style="margin-bottom:var(--s4)">Progress</div>
        <div id="stats"></div>
      </div>
    </section>

    <div class="divider" style="margin:var(--s4) 0"></div>

    <section class="section" style="margin-top:0">
      <div class="section__head">
        <span class="eyebrow">Curriculum · 20 chapters</span>
        <div class="field">
          <select class="select" id="filter" aria-label="Filter by progress">
            <option value="all">All chapters</option>
            <option value="progress">In progress</option>
            <option value="cleared">Cleared</option>
            <option value="untouched">Not started</option>
          </select>
        </div>
      </div>
      <div class="count" id="count"></div>
      <div class="toc" id="toc"></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/course.js"></script>
  <script src="js/cmdpalette.js"></script>
</body>
</html>
