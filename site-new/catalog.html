<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering From Scratch — Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
<link rel="stylesheet" href="css/cmdpalette.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>Synapse Academy</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html">Course</a>

      <a href="catalog.html" aria-current="page">Catalog</a>
      <a href="library.html">Library</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
    <button class="search-btn" type="button" data-cmd-palette aria-label="Search (Cmd-K)" title="Search (Cmd-K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span><kbd>⌘K</kbd>
    </button>
    <span id="sa-auth-btn"></span>
  </header>

  <main class="wrap page" data-screen-label="Catalog">

    <div class="mast">
      <h1 class="mast__t">Catalog</h1>
      <p class="mast__sub">Every lesson across all 20 chapters — find anything fast.</p>
    </div>

    <div class="cat-search" style="margin-top:var(--s4)">
      <span class="cat-search__cue">▸</span>
      <input class="cat-search__in" id="search" type="text" placeholder="Search lessons, languages, topics…" autocomplete="off" autofocus>
    </div>
    <div class="cat-filters" style="margin-top:var(--s3)">
      <div class="chipset" id="typeChips" role="group" aria-label="Type">
        <button class="chip is-on" data-v="all">All types</button>
        <button class="chip" data-v="Learn">Learn</button>
        <button class="chip" data-v="Build">Build</button>
        <button class="chip" data-v="Capstone">Capstone</button>
      </div>
      <div class="chipset" id="statusChips" role="group" aria-label="Status">
        <button class="chip is-on" data-v="all">Any status</button>
        <button class="chip" data-v="cleared">Cleared</button>
        <button class="chip" data-v="open">Open</button>
      </div>
      <select class="select" id="fPhase" aria-label="Filter by chapter"><option value="">All chapters</option></select>
    </div>

    <div class="count" id="count"></div>

    <div class="cat-wrap">
      <table class="cat-table">
        <thead>
          <tr>
            <th data-sort="phase">Chapter<span class="arr"> ▲</span></th>
            <th data-sort="name">Lesson<span class="arr"></span></th>
            <th data-sort="type">Type<span class="arr"></span></th>
            <th data-sort="lang">Language<span class="arr"></span></th>
            <th data-sort="status">Status<span class="arr"></span></th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/cmdpalette.js"></script>
</body>
</html>
